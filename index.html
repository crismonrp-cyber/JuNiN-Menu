<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        :root { --neon: #ff007f; --esp-color: #ff007f; --panel: #0d0d0d; --text: #eee; }
        body { background: transparent; margin: 0; font-family: 'Segoe UI', Arial, sans-serif; color: var(--text); overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }

        .menu {
            width: 720px; height: 440px;
            background: var(--panel); border: 1px solid var(--neon); border-radius: 15px;
            box-shadow: 0 0 40px rgba(255, 0, 127, 0.2); display: flex; overflow: hidden;
        }

        .sidebar { width: 130px; background: rgba(0,0,0,0.6); border-right: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; }
        .sidebar-header { padding: 25px 10px; text-align: center; color: var(--neon); font-weight: 900; font-style: italic; font-size: 22px; }
        .tab { padding: 18px; font-size: 11px; cursor: pointer; opacity: 0.4; transition: 0.3s; text-align: center; font-weight: bold; letter-spacing: 1px; }
        .tab.active { opacity: 1; color: var(--neon); background: rgba(255, 0, 127, 0.1); border-left: 4px solid var(--neon); }

        .main-content { flex: 1; padding: 25px; display: flex; flex-direction: column; }
        .section { display: none; height: 100%; gap: 30px; }
        .section.active { display: flex; }

        .functions-list { width: 230px; display: flex; flex-direction: column; gap: 14px; }
        .option { display: flex; justify-content: space-between; align-items: center; font-size: 13px; color: #ddd; }

        .switch { width: 34px; height: 18px; background: #222; border: 1.5px solid #444; border-radius: 10px; position: relative; cursor: pointer; }
        .switch.on { border-color: var(--neon); background: rgba(255, 0, 127, 0.1); }
        .switch::after { content: ''; position: absolute; width: 12px; height: 12px; background: #444; border-radius: 50%; top: 1.5px; left: 2px; transition: 0.2s; }
        .switch.on::after { left: 17px; background: var(--neon); box-shadow: 0 0 8px var(--neon); }

        .preview-box { flex: 1; background: rgba(0,0,0,0.8); border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; position: relative; display: flex; justify-content: center; align-items: center; }
        .preview-label { position: absolute; top: 12px; left: 15px; font-size: 10px; color: var(--neon); opacity: 0.7; font-weight: bold; }

        .target-dummy { width: 70px; height: 150px; position: relative; }
        .esp-box { position: absolute; top: -10px; left: -15px; width: 100px; height: 170px; border: 1.5px solid var(--esp-color); display: none; }
        .esp-name { position: absolute; top: -35px; width: 100%; text-align: center; font-size: 11px; color: #fff; display: none; font-weight: bold; }
        .esp-dist { position: absolute; bottom: -25px; width: 100%; text-align: center; font-size: 10px; color: var(--esp-color); display: none; }
        .esp-skeleton { position: absolute; width: 100%; height: 100%; display: none; }
        .skel-line { position: absolute; background: var(--esp-color); }

        .color-picker { background: none; border: none; width: 35px; height: 25px; cursor: pointer; }
    </style>
</head>
<body>
<div class="menu">
    <div class="sidebar">
        <div class="sidebar-header">JuNiN</div>
        <div class="tab active" onclick="openTab(event, 'visuals')">VISUALS</div>
        <div class="tab" onclick="openTab(event, 'aim')">AIMBOT</div>
        <div class="tab" onclick="openTab(event, 'misc')">MISC</div>
    </div>

    <div class="main-content">
        <div id="visuals" class="section active">
            <div class="functions-list">
                <div class="option"><span>Name Tags</span><div class="switch" onclick="toggleFeature(this, 'toggleName', 'esp-name')"></div></div>
                <div class="option"><span>Box ESP</span><div class="switch" onclick="toggleFeature(this, 'toggleBox', 'esp-box')"></div></div>
                <div class="option"><span>Skeleton</span><div class="switch" onclick="toggleFeature(this, 'toggleSkel', 'esp-skeleton')"></div></div>
                <div class="option"><span>Distance</span><div class="switch" onclick="toggleFeature(this, 'toggleDist', 'esp-dist')"></div></div>
                <div class="option" style="margin-top: 10px;"><span>ESP Color</span><input type="color" id="espCol" value="#ff007f" class="color-picker" oninput="updateColor('esp', this.value)"></div>
            </div>
            <div class="preview-box">
                <div class="preview-label">PREVIEW</div>
                <div class="target-dummy">
                    <div id="esp-name" class="esp-name">JuNiN_Enemy</div>
                    <div id="esp-box" class="esp-box"></div>
                    <div id="esp-dist" class="esp-dist">32M</div>
                    <div id="esp-skeleton" class="esp-skeleton">
                        <div class="skel-line" style="width:2px; height:50px; left:34px; top:15px;"></div>
                        <div class="skel-line" style="width:40px; height:2px; left:15px; top:25px;"></div>
                        <div class="skel-line" style="width:30px; height:2px; left:20px; top:65px;"></div>
                    </div>
                </div>
            </div>
        </div>
        <div id="aim" class="section"><h1 style="opacity:0.1; margin:auto;">SOON</h1></div>
        <div id="misc" class="section">
            <div class="functions-list">
                <div class="option"><span>Anti-Stream</span><div class="switch" onclick="toggleFeature(this, 'toggleAntiStream')"></div></div>
                <div class="option"><span>Menu Color</span><input type="color" value="#ff007f" class="color-picker" oninput="updateColor('menu', this.value)"></div>
            </div>
        </div>
    </div>
</div>

<script>
    function openTab(evt, name) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(name).classList.add('active');
        evt.currentTarget.classList.add('active');
    }

    function toggleFeature(el, funcName, previewId) {
        el.classList.toggle('on');
        let isOn = el.classList.contains('on');
        if(previewId) document.getElementById(previewId).style.display = isOn ? 'block' : 'none';

        // Отправка в Objective-C
        window.webkit.messageHandlers.JuNiNHandler.postMessage({ "func": funcName, "status": isOn });
    }

    function updateColor(type, val) {
        document.documentElement.style.setProperty(type === 'menu' ? '--neon' : '--esp-color', val);
        window.webkit.messageHandlers.JuNiNHandler.postMessage({ "func": "updateColor", "type": type, "color": val });
    }
</script>
</body>
</html>
